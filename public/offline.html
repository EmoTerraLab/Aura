<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura — Sin Conexión</title>
    <style>
        /* ================================================================
           Aura Offline Page — Diseño autocontenido (sin dependencias externas)
           Colores y tipografía alineados con el Design System de Aura
           ================================================================ */
        /* Nota: No usar @import de fuentes externas — esta página se sirve offline.
           El stack de system fonts garantiza una tipografía premium sin red. */
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, #f7fafa 0%, #e6e9e9 100%);
            color: #181c1d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-text-size-adjust: 100%;
        }

        .offline-container {
            text-align: center;
            max-width: 420px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Icono animado de "sin conexión" */
        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            background: linear-gradient(135deg, #004f56 0%, #066972 50%, #86d3dd 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px -15px rgba(0, 79, 86, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 20px 60px -15px rgba(0, 79, 86, 0.3); transform: scale(1); }
            50% { box-shadow: 0 25px 70px -10px rgba(0, 79, 86, 0.4); transform: scale(1.02); }
        }

        .offline-icon svg {
            width: 56px;
            height: 56px;
            fill: #ffffff;
            opacity: 0.95;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            color: #004f56;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 16px;
            color: #3f484a;
            line-height: 1.6;
            margin-bottom: 32px;
            letter-spacing: 0.01em;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #004f56, #066972);
            color: #ffffff;
            border: none;
            border-radius: 9999px;
            font-family: 'Manrope', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px -3px rgba(0, 79, 86, 0.4);
            text-decoration: none;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px -5px rgba(0, 79, 86, 0.5);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        .retry-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .retry-btn:hover svg {
            transform: rotate(180deg);
        }

        .status-hint {
            margin-top: 24px;
            font-size: 13px;
            color: #6f797a;
            letter-spacing: 0.01em;
        }

        .brand {
            margin-top: 48px;
            font-size: 12px;
            color: #bec8ca;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <!-- Icono Wi-Fi Off -->
        <div class="offline-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M24.24 8l1.76-1.76A15.68 15.68 0 0 0 12 1C8.15 1 4.57 2.36 1.74 4.72L3.5 6.48A13.65 13.65 0 0 1 12 3c3.54 0 6.79 1.34 9.24 3.54L24.24 8zM2.06 5.82L1 6.88 4.43 10.3A11.62 11.62 0 0 0 .38 10.64l1.76 1.76a9.62 9.62 0 0 1 4.05-1.87l2.55 2.55a7.6 7.6 0 0 0-3.11 1.28l1.76 1.76A5.6 5.6 0 0 1 12 14.4c.64 0 1.26.1 1.84.29l2.26 2.26A5.59 5.59 0 0 0 12 14.4a5.59 5.59 0 0 0-4.63 2.44l1.76 1.76A3.57 3.57 0 0 1 12 17.36a3.56 3.56 0 0 1 2.32.87L12 20.56 9.68 18.2 5.35 13.86 2.06 10.58V5.82zM12 14.4c2.62 0 5.01.95 6.87 2.52l1.76-1.76A11.61 11.61 0 0 0 12 11.4c-1.84 0-3.57.44-5.1 1.21l2.26 2.26A7.57 7.57 0 0 1 12 14.4z" transform="translate(0,1)"/>
            </svg>
        </div>

        <h1>Sin Conexión</h1>

        <p class="subtitle">
            No se puede conectar con Aura en este momento. 
            Comprueba tu conexión a internet e inténtalo de nuevo.
        </p>

        <button class="retry-btn" onclick="window.location.reload()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
            Reintentar
        </button>

        <p class="status-hint">
            La página se recargará automáticamente cuando vuelvas a tener conexión.
        </p>

        <p class="brand">Aura · Convivencia Escolar</p>
    </div>

    <script>
        // Auto-reconexión: recargar cuando vuelva la conectividad
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
